version: "3.9"

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - n8n_storage:/home/node/.n8n
    networks:
      - agent-network

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DB_PATH=/data/jobs.db
      - ELIGIBILITY_CONFIG_PATH=/app/config/eligibility.yaml
      - PROFILE_CONFIG_PATH=/app/config/profile.yaml
      - GOOGLE_TOKEN_PATH=/app/.google_token.json
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - RESUMES_DIR=/app/resumes
      - LINKEDIN_PROFILE_DIR=/data/linkedin_profile
      - LINKEDIN_APPLY_WINDOW_START=${LINKEDIN_APPLY_WINDOW_START:-9}
      - LINKEDIN_APPLY_WINDOW_END=${LINKEDIN_APPLY_WINDOW_END:-17}
      - LINKEDIN_DAILY_CAP=${LINKEDIN_DAILY_CAP:-17}
    volumes:
      - ./data:/data
      - ./config:/app/config
      - ./resumes:/app/resumes
      - ./.google_token.json:/app/.google_token.json
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge

volumes:
  n8n_storage:
